<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donation Links</title>
    <!-- 아이콘을 위한 FontAwesome 추가 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* 기본 배경 및 폰트 세팅 */
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: #ffffff;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        /* 중앙 정렬 컨테이너 */
        .links-container {
            width: 100%;
            max-width: 430px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* 공통 버튼 스타일 */
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 16px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            color: #ffffff;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            filter: brightness(1.1);
        }

        /* 플랫폼별 시그니처 색상 고정 */
        .paypal { background-color: #003087; }
        .wise { background-color: #00B574; }
        .streamlabs { background-color: #31ebb6; color: #0f172a; }
        .buymeacoffee { background-color: #FFDD00; color: #000000; }
        .throne { background-color: #ff5a5f; }

        /* 비트코인 섹션 스타일 */
        .bitcoin {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            margin-top: 10px;
        }

        .bitcoin h3 {
            margin: 0 0 12px 0;
            font-size: 18px;
            color: #f7931a; /* 비트코인 오렌지 */
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .bitcoin input {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 12px;
            border-radius: 8px;
            color: #e2e8f0;
            font-size: 14px;
            text-align: center;
            box-sizing: border-box;
            cursor: pointer;
            transition: all 0.2s;
        }

        .bitcoin input:focus {
            outline: none;
            border-color: #f7931a;
            background: rgba(0, 0, 0, 0.5);
        }

        .bitcoin p {
            margin: 8px 0 0 0;
            font-size: 12px;
            color: #94a3b8;
        }
    </style>
</head>
<body>

<div class="links-container">

    <!-- PayPal -->
    <a class="btn paypal" href="https://www.paypal.me/boomyi" target="_blank">
        <i class="fab fa-paypal"></i> PayPal
    </a>

    <!-- Wise -->
    <a class="btn wise" href="https://wise.com/pay/me/donghyunl43" target="_blank">
        <i class="fas fa-paper-plane"></i> Wise
    </a>

    <!-- Streamlabs -->
    <a class="btn streamlabs" href="https://streamlabs.com/boomyitv/tip" target="_blank">
        <i class="fas fa-heart"></i> Streamlabs Tip
    </a>

    <!-- Buy me a coffee -->
    <a class="btn buymeacoffee" href="https://buymeacoffee.com/boomyitv" target="_blank">
        <i class="fas fa-coffee"></i> Exclusive Contents
    </a>

    <!-- Wishlist (Throne) -->
    <a class="btn throne" href="https://throne.com/boomyitv" target="_blank">
        <i class="fas fa-gift"></i> Wishlist
    </a>

    <!-- Bitcoin -->
    <div class="bitcoin">
        <h3><i class="fab fa-bitcoin"></i> Bitcoin</h3>
        <input
            type="text"
            value="1PXf6AE4xFXWuuoe4DXiUQ7Rku2wUyGVT8"
            readonly
            onclick="this.select(); document.execCommand('copy'); alert('주소가 복사되었습니다!');">
        <p>클릭하면 주소가 자동으로 복사됩니다.</p>
    </div>

</div>

</body>
</html>
